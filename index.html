<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUCHIK - Fertilizante Orgánico Aromático Antiplagas 3D</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Import map for Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  
  <!-- GSAP for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-overlay">
    <div class="loader-content">
      <div class="loader-logo">
        <svg viewBox="0 0 100 100" class="leaf-logo">
          <path d="M50,15 C50,15 75,35 75,55 C75,70 63,82 50,82 C37,82 25,70 25,55 C25,35 50,15 50,15 Z" fill="none" stroke="#2e7d32" stroke-width="4" stroke-dasharray="200" stroke-dashoffset="200" id="logo-path" />
          <path d="M50,82 L50,30" fill="none" stroke="#2e7d32" stroke-width="4" />
          <path d="M50,55 Q65,50 70,42" fill="none" stroke="#2e7d32" stroke-width="3" />
          <path d="M50,65 Q35,60 30,52" fill="none" stroke="#2e7d32" stroke-width="3" />
        </svg>
      </div>
      <h1 class="loader-title">MUCHIK</h1>
      <p class="loader-subtitle">Cargando Visualizador 3D Premium...</p>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <span id="progress-text" class="progress-text">0%</span>
      <button id="btn-enter" class="btn-enter disabled" disabled>INICIAR INSPECCIÓN</button>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="app-container">
    
    <!-- HEADER -->
    <header class="app-header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" width="24" height="24">
          <path d="M12,2C12,2 17.5,6.5 17.5,10.5C17.5,13.5 15,16 12,16C9,16 6.5,13.5 6.5,10.5C6.5,6.5 12,2 12,2Z" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12,16L12,6" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12,11C14,10.5 15.5,9.5 16,8" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12,13C10,12.5 8.5,11.5 8,10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="brand-name">MUCHIK®</span>
      </div>
      <div class="product-title-wrap">
        <h1 class="product-title">MUCHIK</h1>
        <p class="product-tagline">Fertilizante Orgánico Aromático Antiplagas</p>
      </div>
    </header>

    <!-- 3D CANVAS -->
    <main class="viewport-container">
      <canvas id="three-canvas"></canvas>
      
      <!-- INTERACTIVE WATERMARK/GUIDE -->
      <div class="interaction-guide">
        <div class="mouse-icon">
          <div class="wheel"></div>
        </div>
        <span>Arrastra para rotar • Scroll para zoom</span>
      </div>
    </main>

    <!-- BOTTOM FLOATING CONTROLS DECK -->
    <div class="quick-controls">
      <!-- Row 1: Primary Actions (Composition, Slider, Toggles) -->
      <div class="control-row">
        <!-- Cutaway Toggle Button -->
        <button id="toggle-cutaway" class="btn-primary-action">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path d="M3,3 H21 V21 H3 Z" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M12,3 V21" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4"/>
            </svg>
          </span>
          <span class="btn-text">Ver Composición</span>
        </button>

        <!-- Inline Cutaway Slider -->
        <div class="slider-container-inline">
          <span class="slider-label">Corte:</span>
          <input type="range" id="cutaway-slider" min="0" max="1" step="0.01" value="0">
          <span id="cutaway-val">0%</span>
        </div>
        
        <!-- Toggle Toggles -->
        <div class="toggles-row">
          <button id="toggle-rotation" class="btn-toggle active">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.57.81"/>
            </svg>
            Giro Automático
          </button>
          <button id="toggle-worms" class="btn-toggle active">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12c0-4 4-4 4 0s4 4 4 0 4-4 4 0 4 4 4 0"/>
            </svg>
            Lombrices
          </button>
        </div>
      </div>

      <!-- Row 2: Visual Adjustments (Camera, Material, Lighting) -->
      <div class="control-grid-bottom">
        <!-- Camera Presets -->
        <div class="control-group">
          <label class="group-label">Ángulo de Cámara</label>
          <div class="camera-presets">
            <button class="btn-camera active" data-preset="front">Frontal</button>
            <button class="btn-camera" data-preset="detail">Detalle</button>
            <button class="btn-camera" data-preset="top">Superior</button>
            <button class="btn-camera" data-preset="inside">Interior</button>
          </div>
        </div>

        <!-- Material Presets -->
        <div class="control-group">
          <label class="group-label">Material del Tambor</label>
          <div class="presets-row">
            <button class="btn-material active" data-mat="matte">Azul Mate</button>
            <button class="btn-material" data-mat="glossy">Azul Brillo</button>
            <button class="btn-material" data-mat="green">Verde Trans.</button>
            <button class="btn-material" data-mat="amber">Ámbar Eco</button>
          </div>
        </div>

        <!-- Light Presets -->
        <div class="control-group">
          <label class="group-label">Iluminación</label>
          <div class="presets-row">
            <button class="btn-light active" data-light="studio">Estudio</button>
            <button class="btn-light" data-light="greenhouse">Invernadero</button>
            <button class="btn-light" data-light="dramatic">Galería</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- THREE.JS CODE -->
  <script type="module" src="app.js"></script>
</body>
</html>
